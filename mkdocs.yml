site_name: Pipeline de Dados - Arquitetura Medalhão
site_description: Projeto de Engenharia de Dados utilizando MongoDB Atlas, Databricks e Delta Lake
site_author: Gustavo Cardoso & João Miguel Rita
repo_url: https://github.com/GustavodeFreitasCardoso/trabalho-eng-dados-arq-medalhao-databricks
repo_name: trabalho-eng-dados-arq-medalhao-databricks

theme:
  name: material
  language: pt-BR

  palette:
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Alternar para modo claro

    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Alternar para modo escuro

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
    - toc.integrate

  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

nav:
  - Início: index.md
# - Bronze: bronze.md
# - Silver: silver.md
# - Gold: gold.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/GustavodeFreitasCardoso

copyright: >
  Copyright &copy; 2026 Gustavo Cardoso & João Miguel Rita